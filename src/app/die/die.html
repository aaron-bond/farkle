<button
  type="button"
  class="die"
  [class.selected]="selected()"
  [disabled]="disabled()"
  [attr.aria-pressed]="selected()"
  (click)="onClick()"
>
  <span class="cube" [style.transform]="cubeTransform()">
    @for (face of faces; track face.cssClass) {
      <span class="face" [class]="face.cssClass" [style.background-image]="faceImage(face.value)"></span>
    }
  </span>
</button>
