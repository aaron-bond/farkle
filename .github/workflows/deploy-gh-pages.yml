name: Deploy dist to gh-pages

on:
  push:
    branches:
      - main   # change to the branch you want to trigger on

permissions:
  contents: write   # allow the workflow to push commits

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Optional: install & build if your dist is generated by a build step
      # - name: Install dependencies
      #   run: npm ci
# 
      # - name: Build
      #   run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages